<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h2>Volunteer Login</h2>
      <p class="subtitle">Login to access volunteer tasks</p>

      <form>
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>

        <button type="submit" class="btn success full">Login</button>

        <button type="button" class="btn primary full">Login with Google</button>

        <p class="small-text">
          Forgot password? <a href="#">Reset</a>
        </p>

        <p class="small-text">
          New volunteer? <a href="volunteer-register.html">Register Here</a>
        </p>
      </form>
    </div>
  </div>

</body>
</html>
