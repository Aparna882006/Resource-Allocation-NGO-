<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Reporter Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card large">

      <h1>Emergency Reporter Portal</h1>
      <p class="subtitle">Register quickly to report emergency needs and help your community</p>

      <form>
        <h2>Registration</h2>

        <label>Full Name (Optional)</label>
        <input type="text" placeholder="Enter your name (optional)">

        <label>Phone Number</label>
        <input type="tel" placeholder="+91 XXXXX XXXXX" required>

        <button type="button" class="btn primary full">Verify Phone (Send OTP)</button>

        <label>Location</label>
        <input type="text" placeholder="City / District / Pincode" required>

        <button type="button" class="btn success full">Use Current Location (GPS)</button>

        <label>Primary Language</label>
        <input type="text" placeholder="Hindi / English / Other" required>

        <label>Type of Emergency Need Required</label>
        <select required>
          <option value="">Select Need Type</option>
          <option>Food & Hunger Support</option>
          <option>Medical Emergency</option>
          <option>Blood Requirement</option>
          <option>Clean Water Supply</option>
          <option>Shelter / Housing</option>
          <option>Natural Disaster Help</option>
          <option>Women Safety Support</option>
          <option>Child Support / Education</option>
          <option>Job / Financial Help</option>
          <option>Other</option>
        </select>

        <label>Urgency Level</label>
        <select required>
          <option value="">Select Urgency</option>
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
          <option>Critical</option>
        </select>

        <label>Emergency Description</label>
        <input type="text" placeholder="Describe briefly (e.g. 20 people need food urgently)" required>

        <!-- IMAGE UPLOAD OPTION -->
        <label>Upload Current Situation Image (Proof)</label>
        <input type="file" accept="image/*" required>

        <div class="checkbox">
          <input type="checkbox" required>
          <span>I agree to share my emergency report with verified NGOs for assistance.</span>
        </div>

        <button type="submit" class="btn primary full">Register & Continue</button>

        <p class="small-text">
          Already registered? <a href="emergency-login.html">Login Here</a>
        </p>

      </form>

    </div>
  </div>

</body>
</html>
