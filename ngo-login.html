<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGO Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">

      <h1>NGO Portal</h1>
      <p class="subtitle">Secure Login for NGO Admin</p>

      <form>
        <h2>NGO Login</h2>

        <label>Institutional Email</label>
        <input type="email" placeholder="example@ngo.org" required>

        <label>Password</label>
        <input type="password" placeholder="Enter password" required>

        <button type="button" class="btn primary full">Login & Send OTP</button>

        <label>Enter OTP</label>
        <input type="text" placeholder="Enter OTP" required>

        <button type="submit" class="btn success full">Verify & Login</button>

        <p class="small-text">
          Forgot password? <a href="#">Reset</a>
        </p>

        <p class="small-text">
          New NGO? <a href="ngo-register.html">Register Here</a>
        </p>

      </form>

    </div>
  </div>

</body>
</html>
