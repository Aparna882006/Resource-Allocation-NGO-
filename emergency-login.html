<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Reporter Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">

      <h1>Emergency Reporter Portal</h1>
      <p class="subtitle">Login using Phone Number & OTP to report urgent needs</p>

      <form>
        <h2>Login</h2>

        <label>Phone Number</label>
        <input type="tel" placeholder="+91 XXXXX XXXXX" required>

        <button type="button" class="btn primary full">Send OTP</button>

        <label>Enter OTP</label>
        <input type="text" placeholder="Enter OTP" required>

        <button type="submit" class="btn success full">Verify & Login</button>

        <p class="small-text">
          New Reporter? <a href="emergency-register.html">Register Here</a>
        </p>

        <p class="small-text">
          <a href="#">Report Anonymously</a>
        </p>

      </form>

    </div>
  </div>

</body>
</html>
