<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citizen Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .dash { text-align:center; }
    .dash .actions{ display:grid; gap:12px; margin-top:18px; }
    .dash .info{ margin-top:10px; font-size:13px; color: var(--muted); }
  </style>
</head>

<body class="form-page">
  <div class="container">
    <div class="card large dash">
      <h1>Citizen Dashboard</h1>
      <p class="subtitle">Welcome! You are logged in as Citizen.</p>

      <div class="info">
        <div><b>Email:</b> <span id="userEmail">-</span></div>
        <div><b>UID:</b> <span id="userUid">-</span></div>
      </div>

      <div class="actions">
        <!-- Optional: link to your Emergency Reporter registration page -->
        <a class="btn primary" href="emergency-register.html" style="display:inline-block;text-decoration:none;">Report Emergency / Register</a>

        <button class="btn success" type="button" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>

  <script>
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      document.getElementById("userEmail").textContent = user.email || "-";
      document.getElementById("userUid").textContent = user.uid || "-";
    });

    async function logout(){
      await auth.signOut();
      localStorage.clear();
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
